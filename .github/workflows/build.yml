name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Usamos Node 22 LTS para evitar advertencias de depreciación
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Vite Frontend
        run: npm run build:vite
        env:
          NODE_ENV: production

      - name: Bundle Automation Scripts
        run: npm run bundle:scripts

      - name: Build and Publish Electron
        # Solo publica (sube el .exe a GitHub) si el push es una etiqueta (v*)
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
