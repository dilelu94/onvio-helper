name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Actualizado a la versión requerida
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --include=dev # Aseguramos devDependencies como Vite

      - name: Build and Release Electron
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: true
          # El comando build ya ejecuta vite build && electron-builder según el package.json
        env:
          NODE_ENV: production
